# Global variables for all hosts
ansible_become: true
backups_directory: /tmp/backup/
backups_register: /opt/docker/backups_register
backups_temporary_private_key_file: "/tmp/backups_private_key.pem"
zfs_backup_target_host: 192.168.2.2
zfs_backup_target_location: /mnt/zfspool/containers-backup/
large_backups_host: 10.10.10.1 # large backups always go from vhost to nas via the 2.5gbps link
large_backups_location: /mnt/disk1/filestore/ # for large backup we rsync directly to the NAS share, instead of zfs 
application_data: /Users/ananchev/Development/containers-at-home/application_data