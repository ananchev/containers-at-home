---
# Nextcloud deployment for vhost (Mac mini / Asahi Linux).
#
# Topology (mirrors the immich model on this host):
#   - EVERYTHING lives on the local NVMe ({{ docker_data_root }}): the Nextcloud
#     data directory (user file archive), Postgres, Redis and app/config. The
#     live runtime therefore touches NO NFS -> no hard-mount hangs, no array
#     spin-up stalls, and content indexing (full-text / Recognize / Context
#     Chat, added later) is fully local and fast.
#   - Backups go to the unraid NAS over the dedicated 2.5Gbit eth-nas link:
#       * data dir  -> rsync to {{ large_backups_host }}:{{ large_backups_location }}nextcloud
#                      (host_commands in backup_definitions.yml; the array copy
#                       is then versioned by borg via the 'nextcloud' borg repo)
#       * database  -> pg_dump, and app config -> tar, both captured by the
#                      normal ZFS backup pipeline (take_backups.yml).
#
# Exposure: nginx-proxy-manager on `fed` (192.168.2.8) reverse-proxies
#   https://cloud.tonio.cc  ->  http://192.168.2.3:{{ nextcloud_http_port }}
#
# Vault variables required (add to group_vars/all/vault.yml):
#   nextcloud_admin_password, nextcloud_db_password, nextcloud_redis_password,
#   nextcloud_mcp_app_password, nextcloud_onlyoffice_jwt_secret,
#   nextcloud_serverinfo_token (serverinfo NC-Token for the Homepage widget).
# Reused from the existing vault: backup_private_key, backup_user.
#
# Image versions are pinned inline because app_versions.yml is vault-encrypted.
# To have DIUN watch them, mirror the snippet from notes/nextcloud.md into the
# vaulted app_versions.yml.
#
# STRUCTURE: the tasks are split into tagged include files under
# tasks/nextcloud/, imported below in dependency order. Each import carries a tag
# so a single concern can be (re)deployed on its own, e.g.:
#   ./run-playbook.sh vhost nextcloud … --tags onlyoffice
#   ./run-playbook.sh vhost nextcloud … --tags mcp
# A full run (no --tags) executes them all, exactly as before. Scoped runs assume
# the shared bits an earlier phase created (network, app container) already exist
# — true after any prior full deploy; a first-ever deploy must run the whole play.

- hosts: homelab
  become: true
  gather_facts: False
  vars:
    application: nextcloud
    host_directory: "{{ docker_data_root }}/{{ application }}"
    data_directory: "{{ docker_data_root }}/{{ application }}/data"   # primary file archive, local NVMe
    docker_network: "{{ application }}-net"
    local_backup_folder: "{{ application_data }}/{{ application }}"

    nextcloud_http_port: "{{ application_services['nextcloud'].ports.web }}"
    nextcloud_hostname: cloud.tonio.cc
    nextcloud_lan_ip: 192.168.2.3
    # Trusted proxies: fed (NPM) + Cloudflare published ranges, so brute-force /
    # rate-limit protection records the real visitor IP, not the CF/NPM hop.
    nextcloud_trusted_proxies: >-
      192.168.2.8
      173.245.48.0/20 103.21.244.0/22 103.22.200.0/22 103.31.4.0/22
      141.101.64.0/18 108.162.192.0/18 190.93.240.0/20 188.114.96.0/20
      197.234.240.0/22 198.41.128.0/17 162.158.0.0/15 104.16.0.0/13
      104.24.0.0/14 172.64.0.0/13 131.0.72.0/22
      2400:cb00::/32 2606:4700::/32 2803:f800::/32 2405:b500::/32
      2405:8100::/32 2a06:98c0::/29 2c0f:f248::/32
    nextcloud_admin_user: ananchev
    nextcloud_db_name: nextcloud
    nextcloud_db_user: nextcloud

    # www-data uid/gid inside the official nextcloud image.
    nextcloud_uid: "33"
    nextcloud_gid: "33"

    # Elasticsearch full-text search (single node, security disabled — it only
    # listens on the isolated nextcloud-net, never exposed). Nextcloud's
    # fulltextsearch_elasticsearch app uses the official elastic client whose
    # product-check rejects OpenSearch, so this must be real Elasticsearch. Image
    # is built below from the app_versions base with ingest-attachment baked in so
    # document *contents* (PDF/Office) are extracted and searchable.
    elasticsearch_image: nextcloud-elasticsearch:local
    elasticsearch_uid: "1000"
    elasticsearch_heap: 2g        # ~50% of the container limit (ES best practice)
    elasticsearch_mem_limit: 4g   # heap + Lucene/Tika off-heap; sized for a ~100GB corpus

    nextcloud_images:
      app: "{{ app_versions.nextcloud_app.image }}"
      postgres: "{{ app_versions.nextcloud_db.image }}"
      redis: "{{ app_versions.nextcloud_redis.image }}"
      mcp: "{{ app_versions.nextcloud_mcp.image }}"   # stock cbcoutinho/nextcloud-mcp-server
      onlyoffice: "{{ app_versions.nextcloud_onlyoffice.image }}"   # onlyoffice/documentserver

    # --- MCP access for claude.ai (web) --------------------------------------
    # Two extra containers on nextcloud-net let claude.ai reach Nextcloud data:
    #   * nextcloud-mcp       — the STOCK upstream MCP server (single-user, Basic
    #     Auth) running as a dedicated, NON-admin `mcp` Nextcloud user. Internal
    #     only (no published port). See notes/nextcloud.md for the user / read-only
    #     shares / `/AI` sandbox setup assumptions that bound its blast radius.
    #   * nextcloud-mcp-shim  — github.com/ananchev/nextcloud-mcp-shim, the OAuth
    #     Resource Server that gates the upstream: serves RFC 9728 discovery,
    #     validates the HS256 tokens minted by the shared `mcp-auth` AS (on unas,
    #     reached at its public URL), then proxies /mcp. The ONLY one exposed,
    #     via NPM (fed) -> ncmcp.tonio.cc. Reuses mcp-auth unchanged (its tokens
    #     are audience-less HS256 — same signing key + issuer is all the shim needs).
    nextcloud_mcp_user: mcp
    nextcloud_mcp_public_url: https://ncmcp.tonio.cc
    nextcloud_mcp_shim_port: 8093
    nextcloud_mcp_shim_repo: https://github.com/ananchev/nextcloud-mcp-shim.git
    nextcloud_mcp_shim_source: "{{ host_directory }}/mcp-shim/source"
    # INTERIM fork build: the upstream MCP server has no file content-search tool,
    # so we run our fork's full-text-search branch (adds nc_files_full_text_search;
    # PR pending upstream at cbcoutinho/nextcloud-mcp-server). app_versions.nextcloud_mcp.image
    # (vault) is pinned to `nextcloud_mcp_fork_image` below. To revert to stock: drop
    # the two fork tasks and point that vault var back at an official ghcr.io tag.
    nextcloud_mcp_fork_repo: https://github.com/ananchev/nextcloud-mcp-server.git
    nextcloud_mcp_fork_version: feat/full-text-search
    nextcloud_mcp_fork_source: "{{ host_directory }}/mcp-fork/source"
    nextcloud_mcp_fork_image: nextcloud-mcp-server:fts-local

    # --- OnlyOffice in-place Office editing -----------------------------------
    # The OnlyOffice Document Server renders/edits docx/xlsx/pptx in the browser.
    # Because the editor runs CLIENT-SIDE, the Document Server is the one Nextcloud
    # component that must be browser-reachable -> exposed via NPM at
    # {{ onlyoffice_public_url }} (the single new public hostname). All heavy
    # traffic stays off Cloudflare though:
    #   * browser -> DS   : {{ onlyoffice_public_url }} (editor JS + websocket edits only)
    #   * NC      -> DS   : http://{{ application }}-onlyoffice/  (docker nextcloud-net)
    #   * DS      -> NC   : http://{{ nextcloud_lan_ip }}:{{ nextcloud_http_port }}/  (host LAN IP,
    #                       already a trusted domain — so file download/save never
    #                       crosses CF and needs no NEXTCLOUD_TRUSTED_DOMAINS change)
    # Security boundary: a shared JWT secret signs every NC<->DS request. It is a
    # vault var (nextcloud_onlyoffice_jwt_secret) since the playbook can't edit the
    # encrypted vault. Generate once with: openssl rand -hex 32
    onlyoffice_public_url: https://office.tonio.cc
    onlyoffice_http_port: 8082

  tasks:
    - name: Run only on the designated host
      when: inventory_hostname in application_services[application].hosts
      block:
        # Dependency order: filesystem/restore prep -> datastores (incl. DB
        # restore) -> app + post-install -> full-text search -> OnlyOffice -> MCP.
        # Each import is tagged so it can be (re)run in isolation; see header.
        - name: Filesystem prep + restore staging
          ansible.builtin.import_tasks: tasks/nextcloud/prep.yml
          tags: [prep, restore]

        - name: Datastores (network, Elasticsearch, Redis, Postgres, DB restore)
          ansible.builtin.import_tasks: tasks/nextcloud/datastores.yml
          tags: [datastores]

        - name: Nextcloud app + cron + post-install tuning
          ansible.builtin.import_tasks: tasks/nextcloud/app.yml
          tags: [app]

        - name: Full-text search (Elasticsearch wiring)
          ansible.builtin.import_tasks: tasks/nextcloud/fulltextsearch.yml
          tags: [fts]

        - name: OnlyOffice in-place editing (Document Server + connector)
          ansible.builtin.import_tasks: tasks/nextcloud/onlyoffice.yml
          tags: [onlyoffice]

        - name: MCP access for claude.ai (server + auth shim)
          ansible.builtin.import_tasks: tasks/nextcloud/mcp.yml
          tags: [mcp]
