---
# Nextcloud deployment for vhost (Mac mini / Asahi Linux).
#
# Topology (mirrors the immich model on this host):
#   - EVERYTHING lives on the local NVMe ({{ docker_data_root }}): the Nextcloud
#     data directory (user file archive), Postgres, Redis and app/config. The
#     live runtime therefore touches NO NFS -> no hard-mount hangs, no array
#     spin-up stalls, and content indexing (full-text / Recognize / Context
#     Chat, added later) is fully local and fast.
#   - Backups go to the unraid NAS over the dedicated 2.5Gbit eth-nas link:
#       * data dir  -> rsync to {{ large_backups_host }}:{{ large_backups_location }}nextcloud
#                      (host_commands in backup_definitions.yml; the array copy
#                       is then versioned by borg via the 'nextcloud' borg repo)
#       * database  -> pg_dump, and app config -> tar, both captured by the
#                      normal ZFS backup pipeline (take_backups.yml).
#
# Exposure: nginx-proxy-manager on `fed` (192.168.2.8) reverse-proxies
#   https://cloud.tonio.cc  ->  http://192.168.2.3:{{ nextcloud_http_port }}
#
# Vault variables required (add to group_vars/all/vault.yml):
#   nextcloud_admin_password, nextcloud_db_password, nextcloud_redis_password
# Reused from the existing vault: backup_private_key, backup_user.
#
# Image versions are pinned inline because app_versions.yml is vault-encrypted.
# To have DIUN watch them, mirror the snippet from notes/nextcloud.md into the
# vaulted app_versions.yml.

- hosts: homelab
  become: true
  gather_facts: False
  vars:
    application: nextcloud
    host_directory: "{{ docker_data_root }}/{{ application }}"
    data_directory: "{{ docker_data_root }}/{{ application }}/data"   # primary file archive, local NVMe
    docker_network: "{{ application }}-net"
    local_backup_folder: "{{ application_data }}/{{ application }}"

    nextcloud_http_port: 8080
    nextcloud_hostname: cloud.tonio.cc
    nextcloud_lan_ip: 192.168.2.3
    nextcloud_trusted_proxies: "192.168.2.8"   # nginx-proxy-manager on fed
    nextcloud_admin_user: ananchev
    nextcloud_db_name: nextcloud
    nextcloud_db_user: nextcloud

    # www-data uid/gid inside the official nextcloud image.
    nextcloud_uid: "33"
    nextcloud_gid: "33"

    nextcloud_images:
      app: "{{ app_versions.nextcloud_app.image }}"
      postgres: "{{ app_versions.nextcloud_db.image }}"
      redis: "{{ app_versions.nextcloud_redis.image }}"

  tasks:
    - name: Run only on the designated host
      when: inventory_hostname in application_hosts[application]
      block:
        - name: Create directories on the local NVMe
          file:
            path: "{{ item }}"
            state: directory
            mode: '0755'
          loop:
            - "{{ host_directory }}"
            - "{{ host_directory }}/html"        # /var/www/html: app code, config, custom_apps, themes
            - "{{ host_directory }}/postgres"
            - "{{ host_directory }}/redis"

        - name: Ensure the data directory exists and is owned by www-data
          file:
            path: "{{ data_directory }}"
            state: directory
            owner: "{{ nextcloud_uid }}"
            group: "{{ nextcloud_gid }}"
            mode: '0770'

        # ----------------------------------------------------------------------
        # Restore detection (mirrors immich.yml). On a fresh install no backup
        # exists; on a rebuild the DB dump + app-config tar are restored and the
        # installer is skipped because config.php already declares 'installed'.
        # The data dir itself is restored separately by rsyncing it back from
        # the NAS array -- see notes/nextcloud.md.
        # ----------------------------------------------------------------------
        - name: Check if a database backup exists locally
          set_fact:
            nextcloud_db_backup_exists: "{{ (local_backup_folder + '/nextcloud_db.sql.gz') is file }}"

        - name: Check if an app-config backup exists locally
          set_fact:
            nextcloud_config_backup_exists: "{{ (local_backup_folder + '/backup.tar.gz') is file }}"

        - name: Copy the database backup to the remote machine
          ansible.builtin.copy:
            src: "{{ local_backup_folder }}/nextcloud_db.sql.gz"
            dest: /tmp/nextcloud_db.sql.gz
          when: nextcloud_db_backup_exists

        - name: Copy the app-config backup to the remote machine
          ansible.builtin.copy:
            src: "{{ local_backup_folder }}/backup.tar.gz"
            dest: /tmp/nextcloud_config.tar.gz
          when: nextcloud_config_backup_exists

        - name: Restore app config / custom_apps into the html volume
          ansible.builtin.command: >
            tar -xzf /tmp/nextcloud_config.tar.gz -C {{ host_directory }}/html
          when: nextcloud_config_backup_exists

        - name: Create docker network for Nextcloud containers
          community.docker.docker_network:
            name: "{{ docker_network }}"
            driver: bridge
            state: present

        - name: Run Redis container (file locking + distributed cache)
          community.docker.docker_container:
            name: "{{ application }}-redis"
            hostname: "{{ application }}-redis"
            image: "{{ nextcloud_images.redis }}"
            command: ["redis-server", "--requirepass", "{{ nextcloud_redis_password }}"]
            network_mode: "{{ docker_network }}"
            detach: true
            restart_policy: unless-stopped
            volumes:
              - "{{ host_directory }}/redis:/data:Z"

        - name: Run Postgres container
          community.docker.docker_container:
            name: "{{ application }}-postgres"
            hostname: "{{ application }}-postgres"
            image: "{{ nextcloud_images.postgres }}"
            network_mode: "{{ docker_network }}"
            detach: true
            restart_policy: unless-stopped
            env:
              POSTGRES_DB: "{{ nextcloud_db_name }}"
              POSTGRES_USER: "{{ nextcloud_db_user }}"
              POSTGRES_PASSWORD: "{{ nextcloud_db_password }}"
            volumes:
              - "{{ host_directory }}/postgres:/var/lib/postgresql/data:Z"

        - name: Wait for Postgres to be ready
          ansible.builtin.command: >
            docker exec {{ application }}-postgres
            pg_isready -U {{ nextcloud_db_user }} -d {{ nextcloud_db_name }}
          register: pg_ready
          until: pg_ready.rc == 0
          retries: 30
          delay: 2
          changed_when: false

        - name: Restore database from backup
          when: nextcloud_db_backup_exists
          ansible.builtin.shell: |
            gunzip --stdout /tmp/nextcloud_db.sql.gz \
            | docker exec -i {{ application }}-postgres \
                psql --dbname={{ nextcloud_db_name }} --username={{ nextcloud_db_user }} \
                --single-transaction --set ON_ERROR_STOP=on
          args:
            executable: /bin/bash

        - name: Run Nextcloud app container
          community.docker.docker_container:
            name: "{{ application }}-app"
            hostname: "{{ application }}-app"
            image: "{{ nextcloud_images.app }}"
            network_mode: "{{ docker_network }}"
            detach: true
            restart_policy: unless-stopped
            ports:
              - "{{ nextcloud_http_port }}:80"
            volumes:
              - "{{ host_directory }}/html:/var/www/html:z"     # shared with the cron container -> :z
              - "{{ data_directory }}:/var/www/html/data:z"
            mounts:
              - source: /etc/localtime
                target: /etc/localtime
                type: bind
                read_only: yes
            env:
              POSTGRES_HOST: "{{ application }}-postgres"
              POSTGRES_DB: "{{ nextcloud_db_name }}"
              POSTGRES_USER: "{{ nextcloud_db_user }}"
              POSTGRES_PASSWORD: "{{ nextcloud_db_password }}"
              REDIS_HOST: "{{ application }}-redis"
              REDIS_HOST_PASSWORD: "{{ nextcloud_redis_password }}"
              NEXTCLOUD_ADMIN_USER: "{{ nextcloud_admin_user }}"
              NEXTCLOUD_ADMIN_PASSWORD: "{{ nextcloud_admin_password }}"
              NEXTCLOUD_TRUSTED_DOMAINS: "{{ nextcloud_hostname }} {{ nextcloud_lan_ip }}"
              NEXTCLOUD_DATA_DIR: /var/www/html/data
              TRUSTED_PROXIES: "{{ nextcloud_trusted_proxies }}"
              OVERWRITEPROTOCOL: https
              OVERWRITEHOST: "{{ nextcloud_hostname }}"
              OVERWRITECLIURL: "https://{{ nextcloud_hostname }}"
              APACHE_DISABLE_REWRITE_IP: "1"
              PHP_MEMORY_LIMIT: 1024M
              PHP_UPLOAD_LIMIT: 16G
              TZ: "Europe/Amsterdam"

        - name: Run Nextcloud cron container (background jobs)
          community.docker.docker_container:
            name: "{{ application }}-cron"
            hostname: "{{ application }}-cron"
            image: "{{ nextcloud_images.app }}"
            entrypoint: ["/cron.sh"]
            network_mode: "{{ docker_network }}"
            detach: true
            restart_policy: unless-stopped
            volumes:
              - "{{ host_directory }}/html:/var/www/html:z"
              - "{{ data_directory }}:/var/www/html/data:z"
            mounts:
              - source: /etc/localtime
                target: /etc/localtime
                type: bind
                read_only: yes

        - name: Wait for Nextcloud to finish first-run install / upgrade
          ansible.builtin.shell: >
            docker exec -u www-data {{ application }}-app
            php occ status --output=json
          register: nc_status
          until: nc_status.rc == 0 and (nc_status.stdout | from_json).installed | default(false)
          retries: 60
          delay: 5
          changed_when: false

        # ----------------------------------------------------------------------
        # Post-install recommended settings (idempotent).
        # ----------------------------------------------------------------------
        - name: Use system cron for background jobs
          ansible.builtin.command: >
            docker exec -u www-data {{ application }}-app php occ background:cron
          changed_when: false

        - name: Add missing database indices
          ansible.builtin.command: >
            docker exec -u www-data {{ application }}-app php occ db:add-missing-indices
          changed_when: false

        - name: Set default phone region
          ansible.builtin.command: >
            docker exec -u www-data {{ application }}-app
            php occ config:system:set default_phone_region --value=NL
          changed_when: false

        - name: Set maintenance window start (UTC hour, low-traffic)
          ansible.builtin.command: >
            docker exec -u www-data {{ application }}-app
            php occ config:system:set maintenance_window_start --type=integer --value=1
          changed_when: false

        # ----------------------------------------------------------------------
        # Backup SSH key for the data-dir rsync to the NAS (see
        # backup_definitions.yml -> nextcloud-app host_commands).
        # ----------------------------------------------------------------------
        - name: Deploy backup SSH private key
          copy:
            content: "{{ backup_private_key }}"
            dest: /home/{{ ansible_user }}/.ssh/nextcloud_backup_key
            mode: '0600'
            setype: ssh_home_t
          become: true
          become_user: "{{ ansible_user }}"
