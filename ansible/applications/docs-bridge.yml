---
# docs-bridge — the full RAG stack (operator side), all on docs-bridge-net:
#   Qdrant (vector store) · ingest-worker (one-shot Docling->BGE-M3->Qdrant ingestion)
#   · docs-bridge server (hybrid search+rerank, MCP + REST) · LibreChat front-end
#   (chat UI + OpenRouter synthesis, calls the server over /mcp) + its MongoDB & Meili.
#   A host systemd timer runs the daily incremental ingest.
#
# STRUCTURE: this master is thin — vars (incl. the host-invariant config contract) +
# tagged imports under tasks/docs-bridge/, in dependency order. Each import carries a
# tag so one concern can be (re)deployed alone, e.g.:
#   ./run-playbook.sh vhost2 docs-bridge ~/.ssh/id_ed25519_vhost -K --tags server
#   ./run-playbook.sh vhost2 docs-bridge ~/.ssh/id_ed25519_vhost -K --tags librechat
# A full run (no --tags) executes them all. Scoped runs assume the shared bits an
# earlier phase created (images, network, config) already exist — true after any prior
# full deploy; a first-ever deploy must run the whole play.
#
# Build context: cloned from the product repo github.com/ananchev/docs-bridge. Both
# images build from the repo ROOT (the docs_bridge package + tools/ are shared);
# the server image bakes the INT8 bge-m3 + bge-reranker models at build time via the
# exporter stage. Build tasks have no force_source, so they SKIP when the image is
# already present (e.g. after a manual docker load). LibreChat/mongo/meili are stock
# multi-arch images (app_versions: librechat, librechat-mongo, librechat-meili).
# Runtime: Podman via its Docker-API socket (pre-requisites-podman.yml).
# Image pin: app_versions['docs-bridge-qdrant'].image (vaulted app_versions.yml).
# Secrets:   docs_bridge_secrets.bearer_token -> server DOCS_BRIDGE_TOKEN (+ the MCP
#            header when librechat_enable_mcp); librechat_secrets.* (see notes).
#
#   ./run-playbook.sh vhost2 docs-bridge ~/.ssh/id_ed25519_vhost -K
#   ./run-playbook.sh vhost2 docs-bridge ~/.ssh/id_ed25519_vhost -K -e run_sync=true                 # + one-shot ingest
#   ./run-playbook.sh vhost2 docs-bridge ~/.ssh/id_ed25519_vhost -K -e run_restore=true               # opt-in restore (qdrant + manifest + mongo)
#   ./run-playbook.sh vhost2 docs-bridge ~/.ssh/id_ed25519_vhost -K -e librechat_enable_mcp=true      # 2.2: wire LibreChat->/mcp
#   ./run-playbook.sh vhost2 docs-bridge ~/.ssh/id_ed25519_vhost -K -e librechat_allow_registration=false  # close signups
- hosts: homelab
  become: true
  gather_facts: false
  vars:
    application: docs-bridge
    host_directory: "{{ docker_data_root }}/{{ application }}"
    docker_network: docs-bridge-net
    repo: https://github.com/ananchev/docs-bridge.git
    source_path: "{{ host_directory }}/source"
    config_file: "{{ host_directory }}/config/config.yaml"
    # Templates live in ansible/_templates; build an absolute path from playbook_dir
    # so the nested tasks/docs-bridge/*.yml files resolve `src` unambiguously (a bare
    # ../_templates is resolved relative to the task file, not the playbook).
    templates_dir: "{{ playbook_dir }}/../_templates"
    # Host-specific payload root (host_vars). Containers always see it as /data,
    # so the config contract's /data/... paths stay host-agnostic.
    data_root: "{{ docs_bridge_data_root }}"
    container_data_root: /data
    # Built from source (the official image's jemalloc aborts on the Pi/M2 16K
    # pages), but the version stays pinned in app_versions.yml as the UPSTREAM ref
    # so diun still notifies on new qdrant releases. We reuse that exact tag for
    # the local build and derive the QDRANT_VERSION build-arg from it.
    qdrant_image: "{{ app_versions[application + '-qdrant'].image }}"   # e.g. qdrant/qdrant:v1.18.2
    qdrant_version: "{{ qdrant_image | regex_replace('^.*:', '') }}"    # e.g. v1.18.2
    qdrant_api: "http://127.0.0.1:6333"
    server_image: "{{ application }}:latest"   # docs-bridge:latest, built from source like ingest-worker
    run_sync: false   # -e run_sync=true to trigger an ingest after deploy
    # Restore is OPT-IN. A normal deploy / container restart NEVER restores — it would
    # only ever fire on a genuinely fresh target anyway (the 404 / absent-manifest /
    # empty-mongo-dir guards in restore.yml + librechat.yml), but those guards are the
    # second line of defence, not the switch. Raise this flag to arm the restore concern
    # (qdrant snapshots + manifest + librechat mongo), still subject to every guard:
    #   -e run_restore=true   (typically a first-ever deploy with archives staged)
    run_restore: false
    # Default so runs with restore DISARMED (the normal case) still satisfy the mongo
    # guard's reference to staged_files. restore.yml set_facts it live when armed.
    staged_files: []

    # --- LibreChat (chat UI + OpenRouter synthesis; the stack's front-end) --------
    # mongo + meili + librechat on docs-bridge-net, so LibreChat reaches the server's
    # MCP at http://docs-bridge:8080/mcp by container DNS (no extra network). LAN-only.
    web_port: "{{ application_services[application].ports.librechat }}"
    librechat_lan_ip: 192.168.2.199                                # vhost2 (lan_addresses.yml)
    librechat_base_url: "http://{{ librechat_lan_ip }}:{{ web_port }}"
    librechat_dir: "{{ host_directory }}/librechat"
    librechat_config_dir: "{{ librechat_dir }}/config"
    librechat_enable_mcp: false        # 2.2: wire the docs-bridge mcpServers block + token
    librechat_allow_registration: true # open for the first account; flip false after
    # Session lifetime (ms expressions). Long access token so a LAN session isn't
    # bounced to login on brief inactivity (the http-origin refresh cookie is flaky).
    librechat_session_expiry: "1000 * 60 * 60 * 12"        # access token: 12h
    librechat_refresh_expiry: "1000 * 60 * 60 * 24 * 30"   # stay-logged-in: 30d
    librechat_images:
      app: "{{ app_versions['librechat'].image }}"
      mongo: "{{ app_versions['librechat-mongo'].image }}"
      meili: "{{ app_versions['librechat-meili'].image }}"

    # Daily incremental ingest, run on the host via a systemd timer (the ingest-worker
    # is a one-shot CLI). Override the schedule with -e docs_bridge_ingest_oncalendar=...
    docs_bridge_ingest_oncalendar: "*-*-* 03:30:00"

    # docs-bridge config contract — host-INVARIANT, non-secret. The boundary with
    # the product repo (design §6). Host-varying knobs are in
    # host_tuning below, merged over this contract at template time.
    docs_bridge:
      embedding_model: BAAI/bge-m3
      embedding_dim: 1024
      # ONNX/INT8 is the validated default (eval 2026-06-21: 4.5x faster than
      # FlagEmbedding/torch, retrieval quality on par). The INT8 model is baked into
      # the ingest-worker image; flip to flagembedding only as a torch fallback.
      embedding_backend: onnx
      embedding_int8: true
      chunk:
        target_tokens: 400
        overlap: 60
        strategy: structure_aware
      parse:
        ocr: false              # digital PDFs; flip true only for scanned corpora
        table_structure: true
      qdrant:
        host: qdrant            # network alias of the qdrant container
        port: 6333
      ingest:
        two_pass: true
      manifest_path: /data/state/manifest.sqlite
      # docs-bridge SERVER only (the ingest-worker parses these but ignores them).
      # model_dir is the path baked into the docs-bridge image.
      rerank:
        enabled: true
        model_dir: /opt/bge-reranker-onnx
        int8: true
        max_length: 512
        # 40 (not 30) is recall-complete on the validated query set: it's the only
        # setting that catches diffuse queries' tied 2nd-best chunk (e.g. T4X-email at
        # RRF rank 40). ~10.8s warm (rerank is ~270ms/candidate). top_n was measured,
        # not guessed: 16 lost answers, dense-only/union/ES all tested worse than RRF.
        top_n: 40
        # Total rerank budget when a search spans MULTIPLE pools (subject=list|"all").
        # Larger than top_n so cross-pool hits aren't squeezed out; bounded regardless
        # of pool count (a single-pool search still uses top_n).
        multi_top_n: 60
      server:
        port: 8080
        default_k: 6
        prefetch_limit: 50
        # MCP server `instructions` injected into the consuming LLM (LibreChat) to steer
        # how it uses search results — citation + answer-language policy. Tunable HERE:
        # re-render config.yaml + `docker restart docs-bridge` (no image rebuild).
        # CORPUS-AGNOSTIC policy only. The per-corpus catalog ("Available corpora:
        # - aig: ... - esys: ...") is auto-composed by the server from the subject
        # descriptions below, so this text never names a corpus.
        instructions: |
          This server ("docs-bridge") retrieves internal technical documentation via
          the `search` tool. When you answer a question using it:
          - Ground every statement ONLY in the returned chunks. If they do not contain
            the answer, say so plainly instead of guessing.
          - Cite the source of each claim inline using the chunk's `source_path` and
            `section` fields, e.g. "(t4s_mapping_config - Mapping Configuration)", and
            list the sources you relied on at the end.
          - Reply in the SAME language as the user's question (default to English if
            unclear), regardless of the language of the source documents.
      # Each corpus: name/dir/collection + a description (the single source of truth
      # for "what this corpus is" — surfaced via list_subjects() and auto-composed into
      # the MCP instructions catalog). Add a corpus = add a block + drop docs + ingest.
      # Product-level pools; overlap is handled at query time (multi-subject search),
      # NOT by splitting — so AIG lives inside `teamcenter` (it runs on/through TC).
      # Relationships are encoded in the descriptions (the model's routing signal).
      subjects:
        - name: teamcenter
          dir: /data/docs/teamcenter
          collection: teamcenter
          description: >-
            Siemens Teamcenter PLM — installation, configuration, administration,
            server/client APIs, SOA & ITK development and customization, and the
            Active Integration Gateway (T4S/T4O) for SAP integration (AIG runs on and
            is configured through Teamcenter, so AIG/install/config topics live here).
        - name: ecosys
          dir: /data/docs/ecosys
          collection: ecosys
          description: >-
            Siemens Ecosys (EcoSys EPC) — enterprise project performance: project
            controls, cost management, scheduling and forecasting.

    # Per-host deployment tuning — kept in this operator playbook on purpose:
    # NOT in host_vars (host facts only) and NOT in the product repo (the app
    # knows nothing about its environment). Explicit per host, no defaults: a
    # docs-bridge host missing from this map fails loudly instead of silently
    # inheriting someone else's settings.
    #   config           -> host-varying ingest/qdrant, merged over the contract
    #                       above at template time
    #   cargo_build_jobs -> qdrant from-source build parallelism (host capacity;
    #                       gather_facts is off, so it can't be derived)
    host_tuning:
      vhost2:                                 # Mac mini M2 (16GB) — production profile
        cargo_build_jobs: "8"
        config:
          ingest: { batch_size: 64 }
          qdrant: { on_disk_vectors: true, quantization: scalar }

  tasks:
    - name: Deploy docs-bridge on its designated host
      when: inventory_hostname in application_services[application].hosts
      block:
        # Dependency order: prep (config + dirs + repo + render + network) -> build
        # images -> Qdrant -> restore (OPT-IN: snapshots + manifest) -> server ->
        # LibreChat -> schedule (ingest timer) -> on-demand ingest. Each import is tagged.
        - name: Prep — config merge, dirs, repo, rendered config, network
          ansible.builtin.import_tasks: tasks/docs-bridge/prep.yml
          tags: [prep]

        - name: Images — build ingest-worker, server, qdrant
          ansible.builtin.import_tasks: tasks/docs-bridge/images.yml
          tags: [images, build]

        - name: Qdrant — run the vector store + readiness
          ansible.builtin.import_tasks: tasks/docs-bridge/qdrant.yml
          tags: [qdrant]

        # OPT-IN: disarmed unless -e run_restore=true. The `restore` tag scopes a run
        # to this concern; the flag is what actually arms it (own guards still apply).
        - name: Restore — Qdrant snapshots + manifest (opt-in, fresh target only)
          ansible.builtin.import_tasks: tasks/docs-bridge/restore.yml
          when: run_restore | bool
          tags: [restore]

        - name: Server — docs-bridge MCP/REST
          ansible.builtin.import_tasks: tasks/docs-bridge/server.yml
          tags: [server]

        - name: LibreChat — mongo, meili, app (+ DB restore-on-fresh)
          ansible.builtin.import_tasks: tasks/docs-bridge/librechat.yml
          tags: [librechat]

        - name: Schedule — daily ingest systemd timer
          ansible.builtin.import_tasks: tasks/docs-bridge/schedule.yml
          tags: [schedule]

        - name: Ingest — one-shot sync (run_sync) + idempotency check
          ansible.builtin.import_tasks: tasks/docs-bridge/ingest.yml
          tags: [ingest]
