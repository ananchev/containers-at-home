backup_definitions:
  # docs-bridge: derived state only — Qdrant collections (consistent snapshot via
  # the Qdrant snapshot API, NOT a live tar) + the SQLite manifest. Done host-side
  # because the data lives on bind mounts and the ingest-worker is a one-shot (no
  # long-running container to exec into). Corpora are source docs, managed
  # separately / re-ingestable (design §10) — we do NOT back up /data/docs, but we
  # DO emit docs-manifest.tsv (sha256<TAB>bytes<TAB>relpath, recursive over
  # /data/docs) so a restored index can be traced back to the exact source files.
  # Per collection: POST a snapshot -> download the .snapshot file -> DELETE it
  # from Qdrant's store. Collections are discovered live from Qdrant (so this
  # stays decoupled from the app's config, which lives in the deploy playbook);
  # an empty Qdrant -> nothing to do. Restore is in the deploy playbook via the
  # snapshot upload API.
  - application: docs-bridge
    container: qdrant
    backup_commands: []
    copy_actions: []
    host_commands:
      - >-
        set -e;
        D="{{ backups_directory }}/{{ backup_timestamp }}/docs-bridge";
        for c in $(curl -sf "http://127.0.0.1:6333/collections"
          | python3 -c 'import sys,json;print(" ".join(x["name"] for x in json.load(sys.stdin)["result"]["collections"]))'); do
          snap=$(curl -sf -X POST "http://127.0.0.1:6333/collections/$c/snapshots"
          | python3 -c 'import sys,json;print(json.load(sys.stdin)["result"]["name"])');
          curl -sf "http://127.0.0.1:6333/collections/$c/snapshots/$snap" -o "$D/$c.snapshot";
          curl -sf -X DELETE "http://127.0.0.1:6333/collections/$c/snapshots/$snap" >/dev/null;
        done
      - >-
        tar -czf "{{ backups_directory }}/{{ backup_timestamp }}/docs-bridge/state.tar.gz"
        -C {{ docs_bridge_data_root }}/state .
      - >-
        set -e;
        D="{{ backups_directory }}/{{ backup_timestamp }}/docs-bridge";
        SRC="{{ docs_bridge_data_root }}/docs";
        : > "$D/docs-manifest.tsv";
        if [ -d "$SRC" ]; then
          cd "$SRC";
          find . -type f -printf '%P\n' | LC_ALL=C sort | while IFS= read -r f; do
            printf '%s\t%s\t%s\n' "$(sha256sum "$f" | cut -d' ' -f1)" "$(stat -c '%s' "$f")" "$f";
          done >> "$D/docs-manifest.tsv";
        fi

  - application: zigbee2mqtt
    container: zigbee2mqtt
    backup_commands:
      - tar -czf /tmp/backup.tar.gz -C /app/data .
    copy_actions:
      - source_path: /tmp/backup.tar.gz
        target_filename: backup.tar.gz
  
  - application: guacamole
    container: guacamole-postgres
    backup_commands:
      - pg_dumpall -U postgres --globals-only -f /tmp/postgres_globals.sql
      - pg_dump -U postgres -F p -f /tmp/guacamole_db.sql guacamole_db
    copy_actions:
      - source_path: /tmp/postgres_globals.sql
        target_filename: postgres_globals.sql
      - source_path: /tmp/guacamole_db.sql
        target_filename: guacamole_db.sql

  - application: authelia
    container: authelia
    backup_commands:
      - tar -czf /tmp/backup.tar.gz -C /config .
    copy_actions:
      - source_path: /tmp/backup.tar.gz
        target_filename: backup.tar.gz

  - application: authelia
    container: authelia-redis
    backup_commands:
      - redis-cli save
    copy_actions:
      - source_path: /data/dump.rdb
        target_filename: dump.rdb

  - application: grafana
    container: grafana
    backup_commands:
      - tar -czf /tmp/backup.tar.gz -C /var/lib/grafana .
    copy_actions:
      - source_path: /tmp/backup.tar.gz
        target_filename: backup.tar.gz

  - application: influxdb
    container: influxdb
    backup_commands:
      - rm -rf /backup
      - influxd backup -portable /backup
      - tar -czf /tmp/backup.tar.gz -C /backup .
      - cp /etc/influxdb/influxdb.conf /backup/influxdb.conf
    copy_actions:
      - source_path: /tmp/backup.tar.gz
        target_filename: backup.tar.gz
      - source_path: /backup/influxdb.conf
        target_filename: influxdb.conf

  - application: mosquitto
    container: mosquitto
    backup_commands: []
    copy_actions:
      - source_path: /mosquitto/data/mosquitto.db
        target_filename: mosquitto.db

  # Below is commented out as currently motioneye is not used
  # - application: motioneye
  #   container: motioneye
  #   backup_commands:
  #     - >
  #       tar
  #       --exclude="source"
  #       --exclude="docker-*"
  #       --exclude="backup.tar.gz"
  #       --exclude="Dockerfile"
  #       -czf /tmp/backup.tar.gz -C /etc/motioneye .
  #   copy_actions:
  #     - source_path: /tmp/backup.tar.gz
  #       target_filename: backup.tar.gz

  - application: nginx-proxy-manager
    container: nginx-proxy-manager
    backup_commands:
      - tar -czf /tmp/backup.tar.gz /data
    copy_actions:
      - source_path: /tmp/backup.tar.gz
        target_filename: backup.tar.gz

  - application: openhab
    container: openhab
    backup_commands:
      - >
       tar --verbose
            --exclude="userdata/backup"
            --exclude="userdata/tmp"
            --exclude="userdata/cache"
            --exclude="userdata/logs"
            -czf /tmp/backup.tar.gz
            -C /openhab/userdata/.. userdata
            -C /openhab/conf/.. conf
    copy_actions:
      - source_path: /tmp/backup.tar.gz
        target_filename: backup.tar.gz

  - application: passbolt
    container: mariadb-passbolt
    backup_commands:
      - mariadb-dump -u {{ passbolt_mysql_user }} -p{{ passbolt_mysql_pass }} {{ passbolt_mysql_db }} --result-file=/tmp/db_backup.sql
      - cp /etc/mysql/conf.d/99-replication.cnf /tmp/99-replication.cnf
    copy_actions:
      - source_path: /tmp/db_backup.sql
        target_filename: db_backup.sql
      - source_path: /tmp/99-replication.cnf
        target_filename: 99-replication.cnf

  - application: passbolt
    container: passbolt
    backup_commands:
      - mkdir -p /tmp/backup/cert /tmp/backup/gpg
      - cp /etc/ssl/certs/certificate.crt /tmp/backup/cert/
      - cp /etc/ssl/certs/certificate.key /tmp/backup/cert/
      - cp /etc/passbolt/gpg/serverkey.asc /tmp/backup/gpg/
      - cp /etc/passbolt/gpg/serverkey_private.asc /tmp/backup/gpg/
      - tar -czvf /tmp/backup.tar.gz -C /tmp backup
    copy_actions:
      - source_path: /tmp/backup.tar.gz
        target_filename: backup.tar.gz

  - application: memos
    container: memos-postgres
    backup_commands:
      - pg_dumpall -U postgres --globals-only -f /tmp/postgres_globals.sql
      - pg_dump -U postgres -F p -f /tmp/memos.sql memos
    copy_actions:
      - source_path: /tmp/postgres_globals.sql
        target_filename: postgres_globals.sql
      - source_path: /tmp/memos.sql
        target_filename: memos.sql
  
  - application: rustdesk
    container: rustdesk-hbbr
    backup_commands:
      - mkdir -p /tmp
      - tar -czf /tmp/backup.tar.gz -C /root .
    copy_actions:
      - source_path: /tmp/backup.tar.gz
        target_filename: backup.tar.gz

  - application: radarr
    container: radarr
    backup_commands:
      - >
        tar --exclude='./logs'
            --exclude='./MediaCover'
            -czf /tmp/backup.tar.gz
            -C /config .
    copy_actions:
      - source_path: /tmp/backup.tar.gz
        target_filename: backup.tar.gz

  - application: sonarr
    container: sonarr
    backup_commands:
      - >
        tar --exclude='./logs'
            --exclude='./MediaCover'
            -czf /tmp/backup.tar.gz
            -C /config .
    copy_actions:
      - source_path: /tmp/backup.tar.gz
        target_filename: backup.tar.gz

  - application: bazarr
    container: bazarr
    backup_commands:
      - >
        tar --exclude='./log'
            --exclude='./cache'
            -czf /tmp/backup.tar.gz
            -C /config .
    copy_actions:
      - source_path: /tmp/backup.tar.gz
        target_filename: backup.tar.gz

  - application: jellyfin
    container: jellyfin
    backup_commands:
      - mkdir -p /tmp
      - tar --exclude='/config/log' -czvf /tmp/backup.tar.gz /config /data
    copy_actions:
      - source_path: /tmp/backup.tar.gz
        target_filename: backup.tar.gz

  - application: borg-ui
    container: borg-ui
    backup_commands:
      - >
        tar -czf /tmp/backup.tar.gz
            -C /data borg.db
            -C /data borg_keys
    copy_actions:
      - source_path: /tmp/backup.tar.gz
        target_filename: backup.tar.gz

  - application: immich
    container: immich-postgres
    backup_commands:
      - pg_dump --clean --if-exists --dbname={{ immich_db_database }} --username={{ immich_db_username }} -f /tmp/immich_db.sql
      - gzip -f /tmp/immich_db.sql
    copy_actions:
      - source_path: /tmp/immich_db.sql.gz
        target_filename: immich_db.sql.gz

  - application: immich
    container: immich-server
    backup_commands: []
    host_commands:
      - >-
        rsync -av --delete
        -e "ssh -i /home/{{ ansible_user }}/.ssh/immich_backup_key -o StrictHostKeyChecking=no"
        {{ docker_data_root }}/immich/media/
        {{ backup_user }}@{{ large_backups_host }}:{{ large_backups_location }}/immich
        > /tmp/immich_rsync.log 2>&1
    copy_actions: []

  - application: nextcloud
    container: nextcloud-postgres
    backup_commands:
      - pg_dump --clean --if-exists --dbname=nextcloud --username=nextcloud -f /tmp/nextcloud_db.sql
      - gzip -f /tmp/nextcloud_db.sql
    copy_actions:
      - source_path: /tmp/nextcloud_db.sql.gz
        target_filename: nextcloud_db.sql.gz

  - application: nextcloud
    container: nextcloud-app
    backup_commands:
      - tar -czf /tmp/backup.tar.gz -C /var/www/html config custom_apps
    copy_actions:
      - source_path: /tmp/backup.tar.gz
        target_filename: backup.tar.gz
    host_commands:
      - >-
        rsync -av --delete
        -e "ssh -i /home/{{ ansible_user }}/.ssh/nextcloud_backup_key -o StrictHostKeyChecking=no"
        {{ docker_data_root }}/nextcloud/data/
        {{ backup_user }}@{{ large_backups_host }}:{{ large_backups_location }}/nextcloud
        > /tmp/nextcloud_rsync.log 2>&1

  - application: caddy
    container: caddy
    backup_commands:
      - mkdir -p /tmp/caddy-backup
      - cp -r /etc/caddy/sites /tmp/caddy-backup/
      - cp -r /certs /tmp/caddy-backup/
      - cp -r /data /tmp/caddy-backup/
      - cp -r /config /tmp/caddy-backup/
      - tar -czf /tmp/backup.tar.gz -C /tmp/caddy-backup .
      - rm -rf /tmp/caddy-backup
    copy_actions:
      - source_path: /tmp/backup.tar.gz
        target_filename: backup.tar.gz

  - application: cycling-stack
    container: cycling-coach
    backup_commands:
      - >
        tar -czvf /tmp/backup.tar.gz
          --exclude="fit_files/source"
          -C /data
          athlete-profile.md
          cycling.db
          cycling.db-wal
          cycling.db-shm
          fit_files
          prompts
    copy_actions:
      - source_path: /tmp/backup.tar.gz
        target_filename: backup.tar.gz

  - application: cycling-stack
    container: mcp-auth-server
    backup_commands: []
    copy_actions:
      - source_path: /data/refresh.json
        target_filename: refresh.json
    host_commands:
      - >-
        cd "{{ backups_directory }}/{{ backup_timestamp }}/cycling-stack"
        && tar -czf mcp-auth-backup.tar.gz refresh.json
        && rm -f refresh.json

  - application: cycling-stack
    container: healthbridge-backend
    backup_commands:
      - tar -czf /tmp/backup.tar.gz -C /data .
    copy_actions:
      - source_path: /tmp/backup.tar.gz
        target_filename: healthbridge-backup.tar.gz
